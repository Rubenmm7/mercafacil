<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon">M</div>
      <h1>Crear cuenta</h1>
      <p>Únete a MercaFácil y ahorra en tus compras</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" [(ngModel)]="nombre" name="nombre" placeholder="Antonio" required />
        </div>
        <div class="form-group">
          <label for="apellidos">Apellidos</label>
          <input id="apellidos" type="text" [(ngModel)]="apellidos" name="apellidos" placeholder="García López"
            required />
        </div>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required
          autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres"
          required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm">Confirmar contraseña</label>
        <input id="confirm" type="password" [(ngModel)]="confirmPassword" name="confirm"
          placeholder="Repite la contraseña" required autocomplete="new-password" />
      </div>

      @if (errorMsg()) {
      <div class="error-msg">{{ errorMsg() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>

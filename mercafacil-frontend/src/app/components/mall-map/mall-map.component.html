<div class="mall-map-container">
  <div class="floor-tabs" aria-label="Selector de planta">
    <button class="floor-tab" [class.active]="activeFloor() === 'baja'" (click)="setFloor('baja')" type="button">
      Planta Baja
    </button>
    <button class="floor-tab" [class.active]="activeFloor() === 'alta'" (click)="setFloor('alta')" type="button">
      Planta Alta
    </button>
  </div>

  <svg class="mall-svg" viewBox="0 0 943 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
    role="img" aria-label="Mapa interactivo de Jaén Plaza">
    <defs>
      <filter id="zoneShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#dc2626" flood-opacity="0.18" />
      </filter>
    </defs>

    <image href="/Mapa-jaen-plaza.png" x="0" y="0" width="943" height="320" preserveAspectRatio="none"
      aria-hidden="true" />

    <g class="zone-layer">
      @for (zone of zones(); track zone.storeId) {
      @if (zone.store) {
      <g class="zone-group" [class.selected]="selectedId() === zone.storeId" [class.floor-zone]="zone.floor !== 'all'"
        [class.floor-active]="zone.floor === activeFloor()" (click)="select(zone.storeId)"
        (keydown)="onKeydown($event, zone.storeId)" tabindex="0" role="button"
        [attr.aria-label]="'Seleccionar tienda ' + zone.store.name">
        <polygon [attr.points]="zone.points" class="zone-polygon" [style.fill]="zoneFill(zone.store)"
          [style.stroke]="zoneStroke(zone.store)" />

        <g class="zone-label-group" [attr.transform]="'translate(' + zone.label.x + ' ' + zone.label.y + ')'">
          <rect class="zone-label-bg" [attr.width]="zone.label.w" [attr.height]="zone.label.h"
            [attr.rx]="zone.label.h / 4" [style.fill]="labelFill(zone.store)" [style.stroke]="zoneStroke(zone.store)" />
          @if (logoUrl(zone.store)) {
          <image class="zone-logo-image" [attr.href]="logoUrl(zone.store)" [attr.x]="2" [attr.y]="2"
            [attr.width]="zone.label.w - 4" [attr.height]="zone.label.h - 4" preserveAspectRatio="xMidYMid meet"
            [attr.alt]="zone.store.name" />
          } @else {
          <text class="zone-label-text" [attr.x]="zone.label.w / 2" [attr.y]="zone.label.h / 2 + 3"
            text-anchor="middle">
            {{ zone.store.logo }}
          </text>
          }
        </g>
      </g>
      }
      }
    </g>

  </svg>
</div>

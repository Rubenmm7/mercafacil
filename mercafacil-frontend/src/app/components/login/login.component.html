<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon">M</div>
      <h1>Iniciar sesión</h1>
      <p>Accede a tu cuenta de MercaFácil</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required
          autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required
          autocomplete="current-password" />
      </div>

      @if (errorMsg()) {
      <div class="error-msg">{{ errorMsg() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Iniciando sesión...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>

    <div class="demo-accounts">
      <p class="demo-title">Cuentas de prueba</p>
      <div class="demo-grid">
        @for (account of demoAccounts; track account.role) {
          <div class="demo-card" (click)="fillDemo(account)" title="Usar esta cuenta">
            <strong>{{ account.role }}</strong>
            <span>{{ account.email }}</span>
            <span>{{ account.password }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>

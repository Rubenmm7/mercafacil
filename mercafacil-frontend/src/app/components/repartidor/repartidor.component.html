<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-icon"><app-icon name="truck" [size]="24" /></span>
      <div>
        <div class="sidebar-title">Panel Repartidor</div>
        <div class="sidebar-user">{{ authService.user()?.nombre }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="resumen" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="bar-chart" /></span> Resumen
      </a>
      <a routerLink="entregas" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="package" /></span> Entregas
      </a>
      <a routerLink="/chats" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="message-circle" /></span> Chats
      </a>
    </nav>

    <a routerLink="/" class="sidebar-back">← Volver al inicio</a>
  </aside>

  <main class="dashboard-content">
    <router-outlet />
  </main>
</div>

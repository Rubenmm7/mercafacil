<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-icon"><app-icon name="store" [size]="24" /></span>
      <div>
        <div class="sidebar-title">Panel Vendedor</div>
        <div class="sidebar-user">{{ authService.user()?.nombre }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="resumen" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="bar-chart" /></span> Resumen
      </a>
      <a routerLink="pedidos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="package" /></span> Pedidos
      </a>
      <a routerLink="productos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="shopping-cart" /></span> Productos
      </a>
      <a routerLink="stock" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="alert-triangle" /></span> Alertas de Stock
      </a>
      <a routerLink="ofertas" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="tag" /></span> Ofertas y Stock
      </a>
    </nav>
  </aside>

  <main class="dashboard-content">
    <router-outlet />
  </main>
</div>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-icon"><app-icon name="shield" [size]="24" /></span>
      <div>
        <div class="sidebar-title">Panel Admin</div>
        <div class="sidebar-user">{{ authService.user()?.nombre }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="resumen" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="bar-chart" /></span> Resumen
      </a>
      <a routerLink="usuarios" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="users" /></span> Usuarios
      </a>
      <a routerLink="tiendas" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="store" /></span> Tiendas
      </a>
      <a routerLink="analytics" routerLinkActive="active" class="nav-item">
        <span class="nav-icon"><app-icon name="bar-chart" /></span> Analytics
      </a>
    </nav>
  </aside>

  <main class="dashboard-content">
    <router-outlet />
  </main>
</div>

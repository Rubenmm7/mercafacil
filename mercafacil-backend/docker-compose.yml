version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mercafacil-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mercafacil_db
      MYSQL_USER: mercafacil_user
      MYSQL_PASSWORD: mercafacil_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docker/init/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    networks:
      - mercafacil-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mercafacil-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: mercafacil_user
      PMA_PASSWORD: mercafacil_pass123
      PMA_ROOT_PASSWORD: root123
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - mercafacil-network

volumes:
  mysql_data:

networks:
  mercafacil-network:
    driver: bridge

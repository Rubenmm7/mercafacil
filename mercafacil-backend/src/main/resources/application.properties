server.port=8080
spring.application.name=mercafacil-backend

# Database — override DB_HOST=mysql when running inside Docker
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mercafacil_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${DB_USER:mercafacil_user}
spring.datasource.password=${DB_PASS:mercafacil_pass123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid
spring.jpa.open-in-view=false
spring.jackson.time-zone=Europe/Madrid

# HTTP / Encoding — fuerza UTF-8 en request/response y en la serializacion JSON
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.com.mercafacil=DEBUG

# CORS — override with comma-separated origins in production
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# JWT
jwt.secret=${JWT_SECRET:bWVyY2FmYWNpbHNlY3JldGtleTIwMjRwcm9qZWN0ZmluYWw=}
jwt.expiration=86400000

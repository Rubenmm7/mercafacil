version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mercafacil-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mercafacil-backend/docker/init/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./mercafacil-backend/docker/init/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    networks:
      - mercafacil-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mercafacil-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mercafacil-network

  backend:
    build:
      context: ./mercafacil-backend
      dockerfile: Dockerfile.dev
    container_name: mercafacil-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      CORS_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    volumes:
      - ./mercafacil-backend:/app # directorio completo montado en vivo
      - maven_cache:/root/.m2 # caché de dependencias Maven
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mercafacil-network
    develop:
      watch:
        - action: rebuild
          path: ./mercafacil-backend/pom.xml

  frontend:
    build:
      context: ./mercafacil-frontend
      dockerfile: Dockerfile.dev
    container_name: mercafacil-frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true" # polling para Windows/WSL2 (inotify no fiable)
    ports:
      - "4200:4200"
    volumes:
      - ./mercafacil-frontend:/app # directorio completo montado en vivo
      - front_node_modules:/app/node_modules # node_modules del contenedor, no del host
    depends_on:
      - backend
    networks:
      - mercafacil-network
    develop:
      watch:
        - action: rebuild
          path: ./mercafacil-frontend/package.json
        - action: rebuild
          path: ./mercafacil-frontend/angular.json

volumes:
  mysql_data:
    driver: local
  maven_cache:
    driver: local
  front_node_modules:
    driver: local

networks:
  mercafacil-network:
    driver: bridge
